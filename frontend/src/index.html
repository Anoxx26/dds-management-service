<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет ДДС</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Система ДДС</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Мониторинг ДДС</a>
                <a class="nav-link" href="dictionaries.html">Управление справочниками</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <header class="pb-3 mb-5 border-bottom">
            <h1 class="fs-4 fw-bold text-secondary">Мониторинг движений денежных средств (ДДС)</h1>
        </header>

        <div class="card p-3 shadow-sm mb-4">
    <form id="filter-form" class="row g-3 align-items-end">
        <div class="col-md-2">
            <label class="form-label small text-muted fw-bold">Дата с</label>
            <input type="date" name="start_date" class="form-control form-control-sm">
        </div>
        <div class="col-md-2">
            <label class="form-label small text-muted fw-bold">Дата по</label>
            <input type="date" name="end_date" class="form-control form-control-sm">
        </div>

        <div class="col-md-2">
            <label class="form-label small text-muted fw-bold">Статус</label>
            <select name="status" id="filter-status" class="form-select form-select-sm">
                <option value="" selected>Все статусы</option>
            </select>
        </div>

        <div class="col-md-2">
            <label class="form-label small text-muted fw-bold">Тип операции</label>
            <select name="transaction_type" id="filter-type" class="form-select form-select-sm">
                <option value="" selected>Все типы</option>
                <option value="1">Пополнение</option>
                <option value="2">Списание</option>
            </select>
        </div>

        <div class="col-md-2">
            <label class="form-label small text-muted fw-bold">Категория</label>
            <select name="category" id="filter-category" class="form-select form-select-sm">
                <option value="" selected>Все категории</option>
            </select>
        </div>

        <div class="col-md-2">
            <label class="form-label small text-muted fw-bold">Подкатегория</label>
            <select name="subcategory" id="filter-subcategory" class="form-select form-select-sm">
                <option value="" selected>Все подкатегории</option>
            </select>
        </div>

        <div class="col-12 text-end mt-3">
            <button type="button" id="filter-reset-btn" class="btn btn-sm btn-outline-secondary ">Сбросить все фильтры</button>
        </div>
    </form>
</div>

        <div class="row g-4">


            <div class="col-lg-12">
                <div class="card p-4 shadow-sm h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 fw-bold">История транзакций</h5>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#transactionModal">
            + Новая транзакция
        </button>
    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Дата</th>
                                    <th>Тип</th>
                                    <th>Категория</th>
                                    <th>Подкатегория</th>
                                    <th>Статус</th>
                                    <th>Сумма</th>
                                    <th>Комментарий</th>
                                    <th class="text-end">Действия</th>
                                </tr>
                            </thead>
                            <tbody id="transactions-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="transactionModal" tabindex="-1" aria-labelledby="transactionModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="form-title">Новая транзакция</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="transaction-form">
                        <input type="hidden" name="id" id="input-id">

                        <div class="mb-3">
                            <label class="form-label">Дата</label>
                            <input type="date" name="date" id="input-date" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Тип операции</label>
                            <select name="transaction_type" id="input-transaction_type" class="form-select" required>
                                <option value="" selected disabled>Выберите тип...</option>
                                <option value="1">Пополнение</option>
                                <option value="2">Списание</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select name="category" id="input-category" class="form-select" required>
                                <option value="" selected disabled>Сначала выберите тип...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Подкатегория</label>
                            <select name="subcategory" id="input-subcategory" class="form-select" required>
                                <option value="" selected disabled>Сначала выберите категорию...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Статус</label>
                            <select name="status" id="input-status" class="form-select" required>
                                <option value="" selected disabled>Загрузка статусов...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Сумма (₽)</label>
                            <input type="number" step="0.01" name="amount" id="input-amount" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Комментарий</label>
                            <textarea name="comment" id="input-comment" class="form-control" rows="2" placeholder="Опишите операцию..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" id="submit-btn" class="btn btn-primary flex-grow-1 py-2 fw-bold">Добавить</button>
                            <button type="button" id="cancel-btn" class="btn btn-outline-secondary d-none py-2" onclick="ui.resetForm()">Отмена</button>
                        </div>
                    </form>
                </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
